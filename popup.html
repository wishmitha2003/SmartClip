<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SmartClip</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* Inline styles to prevent layout shift */
    body { opacity: 0; transition: opacity 0.3s ease; }
    body.loaded { opacity: 1; }
  </style>
</head>
<body class="loaded">
  <div class="container">
    <header>
      <h2>SmartClip</h2>
      <p class="subtitle">Capture your reading list instantly</p>
    </header>

    <button id="saveBtn">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path><polyline points="17 21 17 13 7 13 7 21"></polyline><polyline points="7 3 7 8 15 8"></polyline></svg>
      Save Current Article
    </button>

    <div id="message"></div>

    <div class="saved-section">
      <div class="saved-header">
        <h3>Library</h3>
        <span id="count">0 articles</span>
      </div>

      <div id="articlesList" class="articles-list">
        <p class="empty-text">No saved articles yet.</p>
      </div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
