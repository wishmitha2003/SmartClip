<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="SmartClip icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2563EB" />
      <stop offset="100%" stop-color="#1E40AF" />
    </linearGradient>
    <filter id="softShadow" x="-50%" y="-50%" width="200%" height="200%">
      <feOffset in="SourceAlpha" dx="0" dy="10" result="off"/>
      <feGaussianBlur in="off" stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- rounded square background with gradient and soft shadow -->
  <g filter="url(#softShadow)">
    <rect x="28" y="28" width="456" height="456" rx="72" ry="72" fill="url(#bg)"/>
  </g>

  <!-- center mark: paperclip + subtle S shape, stroked white -->
  <g fill="none" stroke="#FFFFFF" stroke-width="44" stroke-linecap="round" stroke-linejoin="round">
    <!-- S-like primary stroke, simplified for small-size readability -->
    <path d="M160 160
             C220 100 292 100 340 160
             C388 220 340 260 280 300
             C220 340 180 320 160 272"/>
  </g>

  <!-- small bookmark tip to hint paperclip / bookmark -->
  <g fill="none" stroke="#FFFFFF" stroke-width="34" stroke-linecap="round" stroke-linejoin="round">
    <path d="M324 116 L364 116 L364 156"/>
  </g>

</svg>
